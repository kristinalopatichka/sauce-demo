name: Sauce Demo - Playwright Tests
on:
  workflow_dispatch: # Run playwright tests manually only
jobs:
  test:
    timeout-minutes: 10
    runs-on: ubuntu-latest
    env:
      SAUCE_DEMO_BASE_URL: ${{ vars.SAUCE_DEMO_BASE_URL }}
      SAUCE_DEMO_USERNAME: ${{ secrets.SAUCE_DEMO_USERNAME }}
      SAUCE_DEMO_PASSWORD: ${{ secrets.SAUCE_DEMO_PASSWORD }}
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: lts/*

    - name: Install dependencies
      run: npm ci

    - name: Install Playwright Browsers
      run: npx playwright install --with-deps

    - name: Run Playwright tests
      run: npx playwright test

    - name: Upload Playwright failure artifacts
      uses: actions/upload-artifact@v4
      if: ${{ !cancelled() }}
      with:
        name: test-results
        path: test-results/**
        if-no-files-found: ignore
        retention-days: 30
